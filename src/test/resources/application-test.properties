spring.datasource.url=jdbc:h2:mem:assistencedb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.flyway.enabled=false

logging.level.root=WARN
logging.level.com.miguel=INFO
logging.level.org.springframework=ERROR

server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-message=always

security.session.timeout=30m
security.session.refresh-threshold=10m